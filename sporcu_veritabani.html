<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPSSF Sporcu Veritabanı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--navy:#0a1628;
--navy-light:#1a2a4a;
--red:#c4122f;
--red-dark:#a00e26;
--white:#ffffff;
--cream:#f7f5f2;
--gray-50:#fafaf9;
--gray-100:#f0eeeb;
--gray-200:#e2dfd9;
--gray-300:#c8c4bc;
--gray-400:#9e9a92;
--gray-500:#6b6860;
--gray-600:#4a4740;
--shadow-sm:0 1px 3px rgba(10,22,40,0.06);
--shadow-md:0 4px 12px rgba(10,22,40,0.08);
--shadow-lg:0 12px 40px rgba(10,22,40,0.12);
--shadow-xl:0 24px 60px rgba(10,22,40,0.16);
}
html{scroll-behavior:smooth}
body{
font-family:'DM Sans',sans-serif;
background:var(--cream);
color:var(--navy);
min-height:100vh;
-webkit-font-smoothing:antialiased;
}

/* HEADER */
.header{
background:var(--navy);
padding:0;
position:sticky;top:0;z-index:100;
box-shadow:0 4px 20px rgba(10,22,40,0.3);
}
.header-inner{
max-width:1200px;margin:0 auto;
display:flex;align-items:center;justify-content:space-between;
padding:16px 24px;
}
.header-brand{
display:flex;align-items:center;gap:14px;
}
.header-logo{
width:42px;height:42px;
background:var(--red);
border-radius:8px;
display:flex;align-items:center;justify-content:center;
font-family:'Bebas Neue',sans-serif;
font-size:18px;color:white;letter-spacing:1px;
}
.header-title{
font-family:'Bebas Neue',sans-serif;
font-size:clamp(18px,3vw,26px);
color:var(--white);
letter-spacing:2px;
line-height:1;
}
.header-subtitle{
font-size:11px;color:var(--gray-300);
letter-spacing:3px;text-transform:uppercase;
margin-top:2px;
}
.header-badge{
background:rgba(196,18,47,0.15);
border:1px solid rgba(196,18,47,0.3);
color:var(--red);
padding:6px 14px;border-radius:20px;
font-size:12px;font-weight:600;
letter-spacing:0.5px;
}

/* HERO SEARCH */
.hero{
background:linear-gradient(170deg, var(--navy) 0%, var(--navy-light) 100%);
padding:60px 24px 70px;
position:relative;overflow:hidden;
}
.hero::before{
content:'';position:absolute;top:-50%;right:-20%;
width:600px;height:600px;
background:radial-gradient(circle,rgba(196,18,47,0.08) 0%,transparent 70%);
pointer-events:none;
}
.hero::after{
content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,rgba(196,18,47,0.3),transparent);
}
.hero-inner{max-width:800px;margin:0 auto;text-align:center;position:relative;z-index:1}
.hero h1{
font-family:'Bebas Neue',sans-serif;
font-size:clamp(36px,6vw,56px);
color:white;letter-spacing:4px;
margin-bottom:8px;
}
.hero h1 span{color:var(--red)}
.hero p{
color:var(--gray-300);font-size:16px;
margin-bottom:36px;letter-spacing:0.3px;
}
.search-box{
position:relative;max-width:560px;margin:0 auto;
}
.search-box input{
width:100%;padding:18px 24px 18px 54px;
border:2px solid rgba(255,255,255,0.1);
border-radius:14px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
color:white;font-size:17px;
font-family:'DM Sans',sans-serif;
transition:all 0.3s;
outline:none;
}
.search-box input::placeholder{color:var(--gray-400)}
.search-box input:focus{
border-color:var(--red);
background:rgba(255,255,255,0.1);
box-shadow:0 0 30px rgba(196,18,47,0.15);
}
.search-icon{
position:absolute;left:20px;top:50%;transform:translateY(-50%);
color:var(--gray-400);pointer-events:none;
}
.search-stats{
display:flex;justify-content:center;gap:40px;
margin-top:32px;
}
.stat-item{text-align:center}
.stat-num{
font-family:'Bebas Neue',sans-serif;
font-size:32px;color:var(--red);
line-height:1;
}
.stat-label{
font-size:11px;color:var(--gray-400);
text-transform:uppercase;letter-spacing:2px;
margin-top:4px;
}

/* RESULTS */
.results-area{
max-width:1200px;margin:0 auto;
padding:32px 24px;
}
.results-header{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:20px;
}
.results-count{
font-size:14px;color:var(--gray-500);
}
.filter-row{
display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;
}
.filter-btn{
padding:8px 16px;border-radius:8px;
border:1.5px solid var(--gray-200);
background:white;color:var(--gray-500);
font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
cursor:pointer;transition:all 0.2s;
}
.filter-btn:hover{border-color:var(--navy);color:var(--navy)}
.filter-btn.active{
background:var(--navy);color:white;border-color:var(--navy);
}

/* ATHLETE CARDS */
.athletes-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:16px;
}
.athlete-card{
background:white;
border-radius:14px;
padding:24px;
border:1.5px solid var(--gray-100);
cursor:pointer;
transition:all 0.25s ease;
position:relative;overflow:hidden;
}
.athlete-card:hover{
border-color:var(--red);
box-shadow:var(--shadow-lg);
transform:translateY(-2px);
}
.athlete-card::before{
content:'';position:absolute;top:0;left:0;
width:4px;height:100%;
background:var(--red);
opacity:0;transition:opacity 0.25s;
}
.athlete-card:hover::before{opacity:1}
.card-top{
display:flex;justify-content:space-between;align-items:flex-start;
margin-bottom:14px;
}
.card-name{
font-family:'Bebas Neue',sans-serif;
font-size:22px;letter-spacing:1px;
color:var(--navy);
}
.card-sex{
width:28px;height:28px;border-radius:6px;
display:flex;align-items:center;justify-content:center;
font-size:13px;font-weight:700;
}
.card-sex.M{background:rgba(10,22,40,0.08);color:var(--navy)}
.card-sex.F{background:rgba(196,18,47,0.08);color:var(--red)}
.card-meta{
display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;
margin-bottom:14px;
}
.meta-item{
text-align:center;padding:10px 4px;
background:var(--gray-50);border-radius:8px;
}
.meta-val{
font-family:'Bebas Neue',sans-serif;
font-size:20px;color:var(--navy);
line-height:1;
}
.meta-label{
font-size:10px;color:var(--gray-400);
text-transform:uppercase;letter-spacing:1.5px;
margin-top:4px;
}
.card-bottom{
display:flex;justify-content:space-between;align-items:center;
padding-top:12px;
border-top:1px solid var(--gray-100);
}
.card-comp-count{
font-size:12px;color:var(--gray-400);
}
.card-last-date{
font-size:12px;color:var(--gray-500);font-weight:500;
}

/* PROFILE MODAL */
.modal-overlay{
position:fixed;top:0;left:0;right:0;bottom:0;
background:rgba(10,22,40,0.6);
backdrop-filter:blur(4px);
z-index:200;
display:none;align-items:flex-start;justify-content:center;
padding:24px;
overflow-y:auto;
}
.modal-overlay.active{display:flex}
.modal{
background:var(--cream);
border-radius:20px;
max-width:860px;width:100%;
margin:40px auto;
box-shadow:var(--shadow-xl);
overflow:hidden;
animation:modalIn 0.3s ease;
}
@keyframes modalIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
.modal-header{
background:var(--navy);
padding:32px 32px 28px;
position:relative;
}
.modal-close{
position:absolute;top:16px;right:16px;
width:36px;height:36px;border-radius:8px;
background:rgba(255,255,255,0.1);border:none;
color:white;font-size:18px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:background 0.2s;
}
.modal-close:hover{background:rgba(255,255,255,0.2)}
.modal-athlete-name{
font-family:'Bebas Neue',sans-serif;
font-size:clamp(28px,5vw,42px);
color:white;letter-spacing:3px;
}
.modal-athlete-info{
display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;
}
.modal-tag{
padding:5px 12px;border-radius:6px;
font-size:12px;font-weight:600;
letter-spacing:0.5px;
}
.modal-tag.sex{background:rgba(196,18,47,0.2);color:#ff6b7f}
.modal-tag.wc{background:rgba(255,255,255,0.1);color:var(--gray-300)}
.modal-tag.comp{background:rgba(255,255,255,0.1);color:var(--gray-300)}

.modal-stats{
display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:1px;background:var(--navy-light);
}
.modal-stat{
background:var(--navy);padding:20px 16px;text-align:center;
}
.modal-stat-val{
font-family:'Bebas Neue',sans-serif;
font-size:28px;color:var(--red);line-height:1;
}
.modal-stat-label{
font-size:10px;color:var(--gray-400);
text-transform:uppercase;letter-spacing:2px;margin-top:6px;
}

.modal-body{padding:28px 32px 32px}

/* Competition History Table */
.comp-section-title{
font-family:'Bebas Neue',sans-serif;
font-size:22px;letter-spacing:2px;
color:var(--navy);margin-bottom:16px;
display:flex;align-items:center;gap:10px;
}
.comp-section-title::after{
content:'';flex:1;height:1px;background:var(--gray-200);
}
.comp-table-wrap{
overflow-x:auto;border-radius:12px;
border:1.5px solid var(--gray-100);
margin-bottom:24px;
}
table{
width:100%;border-collapse:collapse;
font-size:13px;
}
thead{background:var(--gray-50)}
th{
padding:12px 14px;
text-align:left;
font-size:10px;text-transform:uppercase;
letter-spacing:1.5px;color:var(--gray-400);
font-weight:600;
border-bottom:1.5px solid var(--gray-200);
white-space:nowrap;
}
td{
padding:11px 14px;
border-bottom:1px solid var(--gray-100);
white-space:nowrap;
}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(196,18,47,0.02)}
.place-badge{
display:inline-flex;align-items:center;justify-content:center;
width:26px;height:26px;border-radius:6px;
font-weight:700;font-size:12px;
}
.place-1{background:linear-gradient(135deg,#ffd700,#ffb800);color:#5a4000}
.place-2{background:linear-gradient(135deg,#e0e0e0,#c0c0c0);color:#444}
.place-3{background:linear-gradient(135deg,#e8a87c,#cd7f32);color:#4a2800}
.place-other{background:var(--gray-100);color:var(--gray-500)}
.attempt-good{color:var(--navy);font-weight:500}
.attempt-miss{color:var(--red);opacity:0.6}
.total-cell{font-weight:700;color:var(--navy)}
.gl-cell{
font-weight:700;color:var(--red);
font-family:'Bebas Neue',sans-serif;font-size:16px;
}
.meet-name-cell{
max-width:200px;overflow:hidden;text-overflow:ellipsis;
}

/* GL Trend mini chart */
.gl-trend{
background:white;border-radius:12px;
border:1.5px solid var(--gray-100);
padding:24px;margin-bottom:24px;
}
.gl-trend canvas{width:100%!important;height:200px!important}

/* Share card button */
.share-btn{
display:inline-flex;align-items:center;gap:8px;
padding:12px 24px;border-radius:10px;
background:var(--red);color:white;
font-family:'DM Sans',sans-serif;
font-size:14px;font-weight:600;
border:none;cursor:pointer;
transition:all 0.2s;
}
.share-btn:hover{background:var(--red-dark);transform:translateY(-1px)}

/* EMPTY STATE */
.empty-state{
text-align:center;padding:80px 24px;
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.3}
.empty-text{color:var(--gray-400);font-size:15px}

/* RESPONSIVE */
@media(max-width:640px){
.athletes-grid{grid-template-columns:1fr}
.card-meta{grid-template-columns:1fr 1fr 1fr}
.search-stats{gap:24px}
.modal-body{padding:20px 16px 24px}
.modal-header{padding:24px 16px 20px}
.header-badge{display:none}
.hero{padding:40px 16px 50px}
.filter-row{gap:6px}
.modal-stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

</div>
</section>

<div class="results-area">

<div class="results-header">

<div class="athletes-grid" id="athletesGrid"></div>

<div class="empty-text">Sporcu bulunamadı. Farklı bir isim deneyin.</div>
</div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="modalOverlay">
<div class="modal" id="modal">
<div class="modal-header">
<button class="modal-close" id="modalClose">✕</button>
<div class="modal-athlete-name" id="modalName"></div>
<div class="modal-athlete-info" id="modalInfo"></div>
</div>
<div class="modal-stats" id="modalStats"></div>
<div class="modal-body" id="modalBody"></div>
</div>
</div>

// Precompute
let allAthletes = ATHLETES.map(a => {
  const sbd = a.performances.filter(p => p.event === 'SBD');
  const bench = a.performances.filter(p => p.event === 'B');
  return {...a, sbd, bench, searchStr: a.name.toLowerCase()};
});

// Stats
const totalPerfs = allAthletes.reduce((s,a) => s + a.performances.length, 0);
const allMeets = new Set();
allAthletes.forEach(a => a.performances.forEach(p => allMeets.add(p.meet + p.date)));
document.getElementById('totalAthletes').textContent = allAthletes.length;
document.getElementById('totalPerfs').textContent = totalPerfs;
document.getElementById('totalComps').textContent = allMeets.size;

// Sort by best GL desc
allAthletes.sort((a,b) => b.bestGL - a.bestGL);

let currentFilter = 'all';
let searchTerm = '';

function formatAttempt(val) {
  if (!val) return '-';
  const isNeg = val.startsWith('-');
  const num = isNeg ? val.slice(1) : val;
  return isNeg 
    ? `<span class="attempt-miss">-${num}</span>` 
    : `<span class="attempt-good">${num}</span>`;
}

function getFiltered() {
  return allAthletes.filter(a => {
    if (searchTerm && !a.searchStr.includes(searchTerm)) return false;
    if (currentFilter === 'M' && a.sex !== 'M') return false;
    if (currentFilter === 'F' && a.sex !== 'F') return false;
    if (currentFilter === 'sbd' && a.sbd.length === 0) return false;
    if (currentFilter === 'bench' && a.bench.length === 0) return false;
    return true;
  });
}

function renderCards() {
  const filtered = getFiltered();
  const grid = document.getElementById('athletesGrid');
  const empty = document.getElementById('emptyState');
  document.getElementById('resultsCount').textContent = `${filtered.length} sporcu`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(a => {
    const bestGL = a.bestGL > 0 ? a.bestGL.toFixed(1) : '-';
    const bestTotal = a.bestTotal > 0 ? a.bestTotal : '-';
    return `
    <div class="athlete-card" onclick="openProfile('${a.name.replace(/'/g,"\\'")}')">
      <div class="card-top">
        <div class="card-name">${a.name}</div>
        <div class="card-sex ${a.sex}">${a.sex}</div>
      </div>
      <div class="card-meta">
        <div class="meta-item">
          <div class="meta-val">${bestGL}</div>
          <div class="meta-label">GL Puan</div>
        </div>
        <div class="meta-item">
          <div class="meta-val">${bestTotal}</div>
          <div class="meta-label">En İyi Total</div>
        </div>
        <div class="meta-item">
          <div class="meta-val">${a.lastWC || '-'}</div>
          <div class="meta-label">Sınıf (kg)</div>
        </div>
      </div>
      <div class="card-bottom">
        <div class="card-comp-count">${a.compCount} yarışma</div>
        <div class="card-last-date">Son: ${a.lastComp}</div>
      </div>
    </div>`;
  }).join('');
}

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase()
    .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ü/g,'u')
    .replace(/ş/g,'s').replace(/ç/g,'c').replace(/ğ/g,'g');
  // Also search with original
  const orig = e.target.value.toLowerCase();
  const tmpTerm = searchTerm;
  // Match either normalized or original
  searchTerm = orig;
  renderCards();
  // If no results with original, try normalized
  if (getFiltered().length === 0) {
    searchTerm = tmpTerm;
    renderCards();
  }
});

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderCards();
  });
});

// Profile Modal
function openProfile(name) {
  const a = allAthletes.find(x => x.name === name);
  if (!a) return;

  document.getElementById('modalName').textContent = a.name;
  
  const sexLabel = a.sex === 'M' ? 'ERKEK' : 'KADIN';
  document.getElementById('modalInfo').innerHTML = `
    <span class="modal-tag sex">${sexLabel}</span>
    <span class="modal-tag wc">${a.lastWC ? a.lastWC + ' KG' : ''}</span>
    <span class="modal-tag comp">${a.compCount} YARIŞMA</span>
  `;

  // Best lifts across all SBD
  const sbdPerfs = a.performances.filter(p => p.event === 'SBD' && p.total);
  const bestSq = Math.max(0,...sbdPerfs.map(p => parseFloat(p.bestSq)||0));
  const bestBp = Math.max(0,...sbdPerfs.map(p => parseFloat(p.bestBp)||0));
  const bestDl = Math.max(0,...sbdPerfs.map(p => parseFloat(p.bestDl)||0));

  document.getElementById('modalStats').innerHTML = `
    <div class="modal-stat">
      <div class="modal-stat-val">${a.bestGL > 0 ? a.bestGL.toFixed(1) : '-'}</div>
      <div class="modal-stat-label">En İyi GL</div>
    </div>
    <div class="modal-stat">
      <div class="modal-stat-val">${a.bestTotal > 0 ? a.bestTotal : '-'}</div>
      <div class="modal-stat-label">En İyi Total</div>
    </div>
    <div class="modal-stat">
      <div class="modal-stat-val">${bestSq > 0 ? bestSq : '-'}</div>
      <div class="modal-stat-label">Squat</div>
    </div>
    <div class="modal-stat">
      <div class="modal-stat-val">${bestBp > 0 ? bestBp : '-'}</div>
      <div class="modal-stat-label">Bench</div>
    </div>
    <div class="modal-stat">
      <div class="modal-stat-val">${bestDl > 0 ? bestDl : '-'}</div>
      <div class="modal-stat-label">Deadlift</div>
    </div>
    <div class="modal-stat">
      <div class="modal-stat-val">${a.compCount}</div>
      <div class="modal-stat-label">Yarışma</div>
    </div>
  `;

  // Competition history
  const perfs = [...a.performances].sort((a,b) => b.date.localeCompare(a.date));
  
  let bodyHTML = '';

  // GL Trend (if more than 1 comp with GL)
  const glData = perfs.filter(p => p.gl && parseFloat(p.gl) > 0).reverse();
  if (glData.length > 1) {
    bodyHTML += `
    <div class="comp-section-title">GL PUAN TRENDİ</div>
    <div class="gl-trend">
      <canvas id="glChart"></canvas>
    </div>`;
  }

  bodyHTML += `<div class="comp-section-title">YARIŞMA GEÇMİŞİ</div>`;
  bodyHTML += `<div class="comp-table-wrap"><table>
    <thead><tr>
      <th>Tarih</th><th>Yarışma</th><th>Etkinlik</th><th>Sınıf</th><th>VA</th>
      <th>SQ</th><th>BP</th><th>DL</th>
      <th>Total</th><th>GL</th><th>Yer</th>
    </tr></thead><tbody>`;
  
  perfs.forEach(p => {
    const placeCls = p.place === '1' ? 'place-1' : p.place === '2' ? 'place-2' : p.place === '3' ? 'place-3' : 'place-other';
    const placeDisplay = p.place === 'DQ' ? 'DQ' : p.place === 'DD' ? 'DD' : (p.place || '-');
    
    const sq = p.event === 'SBD' ? (p.bestSq || '-') : '-';
    const bp = p.bestBp || '-';
    const dl = p.event === 'SBD' ? (p.bestDl || '-') : '-';

    bodyHTML += `<tr>
      <td>${p.date}</td>
      <td class="meet-name-cell" title="${p.meet}">${p.meet}</td>
      <td>${p.event}</td>
      <td>${p.wc || '-'}</td>
      <td>${p.bw || '-'}</td>
      <td>${sq}</td>
      <td>${bp}</td>
      <td>${dl}</td>
      <td class="total-cell">${p.total || '-'}</td>
      <td class="gl-cell">${p.gl && parseFloat(p.gl) > 0 ? parseFloat(p.gl).toFixed(1) : '-'}</td>
      <td><span class="place-badge ${placeCls}">${placeDisplay}</span></td>
    </tr>`;
  });

  bodyHTML += `</tbody></table></div>`;

  document.getElementById('modalBody').innerHTML = bodyHTML;

  // Draw GL chart if data exists
  if (glData.length > 1) {
    setTimeout(() => drawGLChart(glData), 100);
  }

  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function drawGLChart(data) {
  const canvas = document.getElementById('glChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = 400;
  ctx.scale(1,1);

  const w = canvas.width, h = canvas.height;
  const pad = {top:30,right:30,bottom:50,left:60};
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  const vals = data.map(d => parseFloat(d.gl));
  const minV = Math.floor(Math.min(...vals) - 2);
  const maxV = Math.ceil(Math.max(...vals) + 2);

  const xStep = cw / (data.length - 1);
  const yScale = ch / (maxV - minV);

  // Grid
  ctx.strokeStyle = '#e2dfd9';
  ctx.lineWidth = 1;
  const gridSteps = 5;
  for (let i = 0; i <= gridSteps; i++) {
    const y = pad.top + (ch / gridSteps) * i;
    ctx.beginPath();ctx.moveTo(pad.left, y);ctx.lineTo(w - pad.right, y);ctx.stroke();
    const val = maxV - ((maxV - minV) / gridSteps) * i;
    ctx.fillStyle = '#9e9a92';ctx.font = '20px DM Sans';ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(1), pad.left - 10, y + 5);
  }

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#c4122f';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  data.forEach((d, i) => {
    const x = pad.left + i * xStep;
    const y = pad.top + (maxV - parseFloat(d.gl)) * yScale;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Area
  ctx.lineTo(pad.left + (data.length-1) * xStep, pad.top + ch);
  ctx.lineTo(pad.left, pad.top + ch);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
  grad.addColorStop(0, 'rgba(196,18,47,0.15)');
  grad.addColorStop(1, 'rgba(196,18,47,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Dots + labels
  data.forEach((d, i) => {
    const x = pad.left + i * xStep;
    const y = pad.top + (maxV - parseFloat(d.gl)) * yScale;
    ctx.beginPath();ctx.arc(x, y, 6, 0, Math.PI*2);
    ctx.fillStyle = '#c4122f';ctx.fill();
    ctx.beginPath();ctx.arc(x, y, 3, 0, Math.PI*2);
    ctx.fillStyle = '#fff';ctx.fill();

    // Date label
    ctx.save();
    ctx.translate(x, pad.top + ch + 15);
    ctx.rotate(-0.5);
    ctx.fillStyle = '#9e9a92';ctx.font = '18px DM Sans';ctx.textAlign = 'center';
    ctx.fillText(d.date.slice(0,7), 0, 0);
    ctx.restore();
  });
}

// Close modal
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// Initial render
renderCards();
